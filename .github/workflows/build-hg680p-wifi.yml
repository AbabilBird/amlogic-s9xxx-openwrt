name: Build OpenWrt 25.12.4 HG680P WiFi

on:
  workflow_dispatch:
    inputs:
      openwrt_kernel:
        description: "Kernel version (6.6.y recommended)"
        required: true
        default: "6.6.y"
        type: choice
        options:
          - 6.6.y
          - 6.1.y
          - 6.12.y
      wifi_ssid:
        description: "Default WiFi SSID"
        required: true
        default: "HG680P-OpenWrt"
        type: string
      wifi_password:
        description: "Default WiFi Password (min 8 chars)"
        required: true
        default: "12345678"
        type: string

permissions:
  contents: write

env:
  TZ: Asia/Jakarta
  OPENWRT_VERSION: "25.12.4"
  OPENWRT_BOARD: "s905x"
  KERNEL_REPO: "ophub/kernel"
  KERNEL_USAGE: "stable"

jobs:
  build:
    runs-on: ubuntu-24.04
    if: github.event.repository.owner.id == github.event.sender.id
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          [[ -d "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc 2>/dev/null
          sudo bash -c 'apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell* openjdk* mongodb* moby* || true'
          sudo apt-get -y autoremove --purge
          sudo apt-get clean
          sudo apt-get update
          sudo apt-get install -y $(curl -fsSL https://tinyurl.com/ubuntu2404-make-openwrt-depends)
          sudo timedatectl set-timezone "${TZ}"
          echo "status=success" >> ${GITHUB_OUTPUT}
          echo "build_date=$(date +"%Y.%m.%d")" >> ${GITHUB_OUTPUT}

      - name: Create disk
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner:runner /builder

      - name: Build rootfs with ImageBuilder
        id: imagebuilder
        run: |
          mkdir -p /builder/openwrt && cd /builder/openwrt
          IB_FILE="openwrt-imagebuilder-${{ env.OPENWRT_VERSION }}-armsr-armv8.Linux-x86_64.tar.zst"
          curl -fsSLO "https://downloads.openwrt.org/releases/${{ env.OPENWRT_VERSION }}/targets/armsr/armv8/${IB_FILE}"
          tar --use-compress-program=unzstd -xf "${IB_FILE}" && rm -f "${IB_FILE}"
          cd openwrt-imagebuilder-*/
          mkdir -p files/etc/uci-defaults
          # Write WiFi setup script using printf (no heredoc)
          printf '#!/bin/sh\nsleep 3\nmodprobe r8723bs 2>/dev/null || true\nsleep 2\nuci set wireless.radio0=wifi-device\nuci set wireless.radio0.type=mac80211\nuci set wireless.radio0.channel=6\nuci set wireless.radio0.htmode=HT40\nuci set wireless.radio0.band=2g\nuci set wireless.radio0.disabled=0\nuci set wireless.radio0.country=ID\nuci set wireless.radio0.txpower=20\nuci set wireless.default_radio0=wifi-iface\nuci set wireless.default_radio0.device=radio0\nuci set wireless.default_radio0.network=lan\nuci set wireless.default_radio0.mode=ap\nuci set wireless.default_radio0.ssid=${{ inputs.wifi_ssid }}\nuci set wireless.default_radio0.encryption=psk2\nuci set wireless.default_radio0.key=${{ inputs.wifi_password }}\nuci set wireless.default_radio0.disassoc_low_ack=0\nuci commit wireless\necho r8723bs >> /etc/modules.d/rtl8723bs 2>/dev/null || true\nexit 0\n' > files/etc/uci-defaults/99-hg680p-wifi
          chmod +x files/etc/uci-defaults/99-hg680p-wifi
          make image PROFILE="generic" PACKAGES="base-files busybox coreutils bash curl wget-ssl nano htop kmod-cfg80211 kmod-mac80211 kmod-rtl8723bs wpad-basic-mbedtls wireless-tools iw iwinfo hostapd-common luci luci-base luci-mod-admin-full luci-mod-network luci-mod-status luci-mod-system luci-theme-bootstrap luci-app-firewall luci-app-package-manager luci-proto-ppp luci-proto-ipv6 luci-i18n-base-zh-cn ppp ppp-mod-pppoe dnsmasq-full kmod-nft-offload kmod-nft-nat block-mount kmod-fs-ext4 kmod-fs-btrfs kmod-fs-vfat kmod-usb-core kmod-usb2 kmod-usb3 kmod-usb-storage btrfs-progs dosfstools e2fsprogs fdisk parted losetup blkid lsblk mount-utils resize2fs tune2fs tar gzip unzip zstd pigz usbutils pv attr ttyd luci-app-ttyd iperf3" FILES="files"
          ROOTFS=$(find bin/targets/ -name "*rootfs.tar.gz" | head -1)
          [[ -n "${ROOTFS}" ]] || exit 1
          cp "${ROOTFS}" /builder/openwrt/openwrt-armsr-armv8-rootfs.tar.gz
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Package for HG680P
        if: steps.imagebuilder.outputs.status == 'success'
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: /builder/openwrt/openwrt-armsr-armv8-rootfs.tar.gz
          openwrt_board: ${{ env.OPENWRT_BOARD }}
          openwrt_kernel: ${{ inputs.openwrt_kernel }}
          auto_kernel: true
          kernel_repo: ${{ env.KERNEL_REPO }}
          kernel_usage: ${{ env.KERNEL_USAGE }}
          openwrt_size: "256/1024"
          builder_name: "HG680P-WiFi"

      - name: Upload to Release
        if: env.PACKAGED_STATUS == 'success'
        uses: ncipollo/release-action@main
        with:
          tag: OpenWrt_HG680P_WiFi_v${{ env.OPENWRT_VERSION }}
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## OpenWrt ${{ env.OPENWRT_VERSION }} for HG680P (WiFi Optimized)
            - Device: FiberHome HG680P (S905X, 2GB RAM, 8GB eMMC)
            - Kernel: ${{ inputs.openwrt_kernel }} LTS (ophub stable)
            - WiFi: RTL8723BS HT40 optimized
            - IP: 192.168.1.1 | User: root | Pass: password
            - SSID: ${{ inputs.wifi_ssid }}